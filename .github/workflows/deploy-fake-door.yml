name: Deploy fake-door to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - "apps/fake-door/**"
      - "packages/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-fake-door.yml"
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-fake-door
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build fake-door
        run: npm run build:fake-door

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/fake-door
          command: pages deploy dist --project-name beforeshow --branch main
